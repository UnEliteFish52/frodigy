<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frodigy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <div class="logo-area">
            <h1 class="logo">Frodigy</h1>
            <p class="logo-tagline">Prodigy level productivity</p>
          </div>

          <nav class="nav-menu">
            <a href="#dashboard" class="nav-item active" data-page="dashboard">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
              </span>
              <span class="nav-label">Dashboard</span>
              <kbd class="nav-shortcut">⌘1</kbd>
            </a>
            <a href="#calendar" class="nav-item" data-page="calendar">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
              <span class="nav-label">Calendar & Notes</span>
              <kbd class="nav-shortcut">⌘2</kbd>
            </a>
            <a href="#timers" class="nav-item" data-page="timers">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </span>
              <span class="nav-label">Timers</span>
              <kbd class="nav-shortcut">⌘3</kbd>
            </a>
            <a href="#completed" class="nav-item" data-page="completed">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              </span>
              <span class="nav-label">Completed</span>
              <kbd class="nav-shortcut">⌘4</kbd>
            </a>
            <a href="#summary" class="nav-item" data-page="summary">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
              </span>
              <span class="nav-label">Summary</span>
              <kbd class="nav-shortcut">⌘5</kbd>
            </a>
            <a href="#settings" class="nav-item" data-page="settings">
              <span class="nav-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </span>
              <span class="nav-label">Settings</span>
              <kbd class="nav-shortcut">⌘6</kbd>
            </a>
          </nav>
        </div>

        <div class="sidebar-bottom">
          <div class="active-timers-badge">
            <span class="timer-badge-label">ACTIVE TIMERS</span>
            <span class="timer-badge-count" id="active-timer-count">No timers running</span>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="page-content">
        <!-- Pages render here -->
      </main>
    </div>

    <!-- Page Modules -->
    <script src="./pages/dashboard.js"></script>
    <script src="./pages/calendar.js"></script>
    <script src="./pages/timers.js"></script>
    <script src="./pages/completed.js"></script>
    <script src="./pages/summary.js"></script>
    <script src="./pages/settings.js"></script>

    <!-- Main Router -->
    <script src="./renderer.js"></script>
  </body>
</html>
